version: 1
# workflow family: abfe, asfe, rbfe, or md
protocol: rbfe
# execution backend; these examples use the local orchestrator
backend: local

create:
  # label used in output paths and generated job names
  system_name: adrb2_A
  # input protein structure used for receptor staging
  protein_input: reference/adrb2_A.pdb
  # membrane+solvent reference structure used to seed the simulation box
  system_input: reference/adrb2_A_membrane.pdb
  # optional restart/coordinate file carrying the correct box vectors
  system_coordinate: reference/adrb2_A_membrane.rst7
  # alignment selection used when orienting the receptor
  protein_align: name CA and resid 50 to 200
  # JSON dictionary mapping ligand names to input files
  ligand_input: reference/ligands_dict.json
  # ligand force field / parameter set
  ligand_ff: openff-2.3.0
  # keep the staged ligand+protein complex files after setup
  retain_lig_prot: true
  # partial-charge model used during ligand parameterization
  param_charge: "openff-gnn-am1bcc-1.0.0.pt"

  # three receptor anchor atoms used by staging and binding-site validation
  anchor_atoms:
    - "name CA and resid 113"
    - "name CA and resid 82"
    - "name CA and resid 316"
  # membrane lipid residue names present in the input structure
  lipid_mol: ["POPC"]
  # rebuild staged files even if they already exist
  overwrite: false
  # AMBER force field for the receptor
  receptor_ff: protein.ff19SB
  # AMBER lipid force field for membrane systems
  lipid_ff: lipid21
  # solvent padding used when BATTER needs to add solvent around a ligand-only system
  solv_shell: 15.0
  # explicit water model passed to tleap
  water_model: OPC

run:
  # top-level work directory for executions/ and results/
  output_folder: RBFE_simulations
  # stop after shared prep/equilibration and FE window setup when true
  only_fe_preparation: false
  # prepare inputs without launching MD
  dry_run: false
  # execution directory name; use distinct ids for replicates
  run_id: rep1
  # local parallelism during staging and analysis
  max_workers: 8
  # how failed transformations should be handled during orchestration
  on_failure: prune
  slurm:
    # cluster partition/queue for generated sbatch scripts
    partition: rondror

rbfe:
  # network builder used to connect ligands into transformations
  mapping: konnektor
  # atom mapper used when generating pairwise transformations
  # can be kartograf or lomap
  atom_mapper: kartograf
  # Konnektor network layout heuristic
  konnektor_layout: redundantminimalspanningtree
  # whether to generate both directions for each edge
  both_directions: false

fe_sim:
  # 48-window lambda schedule for larger or harder RBFE transformations.
  lambdas: [0.00000000, 0.12542000, 0.16637000, 0.19653000, 0.22148000, 0.24326000, 0.26289000, 0.28094000, 0.29779000, 0.31370000, 0.32884000, 0.34336000, 0.35737000, 0.37095000, 0.38416000, 0.39707000, 0.40971000, 0.42215000, 0.43441000, 0.44652000, 0.45852000, 0.47043000, 0.48228000, 0.49410000, 0.50590000, 0.51772000, 0.52958000, 0.54150000, 0.55351000, 0.56563000, 0.57790000, 0.59036000, 0.60303000, 0.61596000, 0.62920000, 0.64280000, 0.65684000, 0.67140000, 0.68659000, 0.70254000, 0.71944000, 0.73754000, 0.75722000, 0.77906000, 0.80408000, 0.83431000, 0.87533000, 1.00000000]
  # production steps for the x component
  x_n_steps: 1000000
  # no equilibration
  eq_steps: 0
  # non-bonded cutoff in Angstrom
  cut: 9.0
  # Monte Carlo barostat
  barostat: 2
  # use hydrogen mass repartitioning
  hmr: yes
  # 4 fs time step with HMR
  dt: 0.004
  # solvent padding along Z for soluble or membrane-transformation boxes
  buffer_z: 10.0
  # solvent padding along X for soluble RBFE systems
  buffer_x: 10.0
  # solvent padding along Y for soluble RBFE systems
  buffer_y: 10.0
  # simulation temperature in Kelvin
  temperature: 298.15
  # analysis only start from 100000 steps
  analysis_start_step: 100000
  # MBAR analysis blocks
  blocks: 5
